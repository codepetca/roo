  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U codegrade"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Optional: Redis (for caching/sessions)
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
